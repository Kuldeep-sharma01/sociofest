version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: sociofest-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build: ./server
    container_name: sociofest-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/sociofestdb
      - NODE_ENV=production
      - PYTHON_INTERNAL_URL=http://python-service:5001 # Internal Docker service name
      - VOICE_AI_URL=http://voice-ai:8000 # Internal Docker service name
      - SD_API_URL=http://sd-webui:7860 # Internal Docker service name
      - COMPILER_TEST_URL=http://judge0-mono:2358 # Internal Docker service name
      - FRONTEND_URL=http://localhost,http://127.0.0.1 # For local Docker dev CORS
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      python-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  python-service:
    build: ./server/python_modules
    container_name: sociofest-python
    ports:
      - "5001:5001"
    env_file:
      - ./server/python_modules/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/sociofestdb #
    volumes:
      - python_models:/app/model_cache
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Voice AI — optional, requires heavy ML deps. Opt-in with:
  #   docker compose -f docker-compose.full.yml --profile voice up -d
  voice-ai:
    build:
      context: ./server/python_modules
      dockerfile: Dockerfile.voice
    container_name: sociofest-voice-ai
    profiles:
      - voice
    ports:
      - "8000:8000"
    restart: unless-stopped

  nginx:
    build:
      context: ./client
    container_name: sociofest-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
      python-service:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  # Stable Diffusion — optional, requires NVIDIA GPU. Opt-in with:
  #   docker compose -f docker-compose.full.yml --profile gpu up -d
  sd-webui:
    image: ghcr.io/abdulrhmn/sd-webui:latest
    container_name: sociofest-sd
    profiles:
      - gpu
    ports:
      - "7860:7860"
    volumes:
      - sd_models:/data/models
      - sd_outputs:/data/outputs
    environment:
      - CLI_ARGS=--listen --enable-insecure-extension-access --api
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped

volumes:
  mongo_data:
  backend_uploads:
  python_models:
  sd_models:
  sd_outputs:
