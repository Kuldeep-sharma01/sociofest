version: "3.8"

services:
  nginx:
    build:
      context: ./client
      args:
        # Behind nginx, client uses relative paths — nginx proxies to services
    container_name: sociofest-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro # Mount SSL certs
    depends_on:
      - backend
      - python-service
    restart: unless-stopped
    networks:
      - sociofest-net

  backend:
    build: ./server
    container_name: sociofest-backend
    environment:
      - MONGODB_URI=${MONGODB_URI} # External Atlas connection string
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=production
      - PYTHON_URL=http://python-service:5001
      - VOICE_AI_URL=http://voice-ai:8000
      - CUSTOM_AI_URL=http://voice-ai:8000/clone-voice
      - FRONTEND_URL=${FRONTEND_URL} # Cloud domain
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped
    networks:
      - sociofest-net
    secrets:
      - db_password
      - redis_password

  python-service:
    build: ./python_modules
    container_name: sociofest-python
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - FRONTEND_URL=${FRONTEND_URL}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - python_models:/app/model_cache
    restart: unless-stopped
    networks:
      - sociofest-net
    secrets:
      - db_password

  # Voice AI — optional, enable with: --profile voice
  voice-ai:
    build:
      context: ./python_modules
      dockerfile: Dockerfile.voice
    container_name: sociofest-voice
    profiles:
      - voice
    restart: unless-stopped
    networks:
      - sociofest-net

  redis:
    image: redis:7-alpine
    container_name: sociofest-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - sociofest-net

volumes:
  backend_uploads:
  python_models:
  redis_data:

networks:
  sociofest-net:
    driver: bridge

secrets:
  db_password:
    file: ./secrets/db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
