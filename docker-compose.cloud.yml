version: "3.8"

services:
  nginx:
    build:
      context: ./client
      args:
        - CLIENT_URL=/api
        - PYTHON_API_URL=/python-api
        - VITE_VOICE_API_URL=/voice-api
        - VITE_SD_API_URL=/sd-api
    container_name: sociofest-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro # Mount SSL certs
    depends_on:
      - backend
      - python-service
    restart: unless-stopped
    networks:
      - sociofest-net

  backend:
    build: ./server
    container_name: sociofest-backend
    environment:
      - MONGODB_URI=${MONGODB_URI} # External Atlas connection string
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=production
      - PYTHON_API_URL=http://python-service:5001
      - VOICE_AI_URL=http://voice-ai:8000
      - CLIENT_URL=${CLIENT_URL} # Cloud domain
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped
    networks:
      - sociofest-net
    secrets:
      - db_password
      - redis_password

  python-service:
    build: ./server/python_modules
    container_name: sociofest-python
    environment:
      - MONGODB_URI=${MONGODB_URI}
    volumes:
      - python_models:/app/model_cache
    restart: unless-stopped
    networks:
      - sociofest-net
    secrets:
      - db_password

  voice-ai:
    build:
      context: ./server/python_modules
      dockerfile: Dockerfile.voice
    container_name: sociofest-voice
    restart: unless-stopped
    networks:
      - sociofest-net

  redis:
    image: redis:7-alpine
    container_name: sociofest-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - sociofest-net

volumes:
  backend_uploads:
  python_models:
  redis_data:

networks:
  sociofest-net:
    driver: bridge

secrets:
  db_password:
    file: ./secrets/db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
