# /sociofest/nginx.conf
events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # 1. Main SocioFest App (Vite React)
        location / {
            proxy_pass http://host.docker.internal:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 2. Next.js Attendance Frontend
        location /attendance/ {
            proxy_pass http://host.docker.internal:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. Node.js Main API Backend
        location /api/ {
            proxy_pass http://host.docker.internal:5000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 4. Face Recognition Python API
        location /python-api/ {
            proxy_pass http://host.docker.internal:5001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 5. Voice AI API
        location /voice-api/ {
            proxy_pass http://host.docker.internal:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 6. Stable Diffusion API
        location /sd-api/ {
            proxy_pass http://host.docker.internal:7860/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
