# /sociofest/nginx.conf
# Used by docker-compose.full.yml — routes all traffic through a single port 80/443
# Works on both Docker Desktop (Mac/Win) AND native Linux Docker

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Increase timeouts for AI/upload endpoints
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    client_max_body_size 50m;

    # Upstream definitions — use Docker service names (from docker-compose)
    upstream backend_upstream {
        server backend:5000;
    }
    upstream python_upstream {
        server python-service:5001;
    }


    server {
        listen 80;

        # 1. Main SocioFest SPA (served by nginx container from built files)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(?:css|js|jpg|svg|jpeg|gif|png|ico|woff2?|eot|ttf)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # 2. Node.js Main API Backend (REST + WebSocket)
        location /api/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Uploads served by backend
        location /uploads/ {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 4. Socket.io WebSocket endpoint
        location /socket.io/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 5. Face Recognition Python API (strips /python-api/ prefix)
        location /python-api/ {
            proxy_pass http://python_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


    }
}
